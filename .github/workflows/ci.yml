name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: cd apps/platform && npx prisma generate

      - name: Lint (non-blocking)
        run: cd apps/platform && npm run lint || true

      - name: Typecheck (non-blocking)
        run: cd apps/platform && npm run typecheck || true

      - name: Tests (non-blocking)
        run: cd apps/platform && npm test || true

      - name: Build
        run: cd apps/platform && npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
