version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: yourclass
      POSTGRES_PASSWORD: yourclass
      POSTGRES_DB: yourclass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yourclass']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://yourclass:yourclass@postgres:5432/yourclass
      - REDIS_URL=redis://redis:6379
      - PORT=3001
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - OTP_SECRET=${OTP_SECRET}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  tenant-service:
    build:
      context: ./services/tenant
      dockerfile: Dockerfile
    ports:
      - '3002:3002'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://yourclass:yourclass@postgres:5432/yourclass
      - PORT=3002
    depends_on:
      postgres:
        condition: service_healthy

  course-service:
    build:
      context: ./services/course
      dockerfile: Dockerfile
    ports:
      - '3003:3003'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://yourclass:yourclass@postgres:5432/yourclass
      - PORT=3003
    depends_on:
      postgres:
        condition: service_healthy

  video-service:
    build:
      context: ./services/video
      dockerfile: Dockerfile
    ports:
      - '3004:3004'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://yourclass:yourclass@postgres:5432/yourclass
      - PORT=3004
    depends_on:
      postgres:
        condition: service_healthy

  payment-service:
    build:
      context: ./services/payment
      dockerfile: Dockerfile
    ports:
      - '3005:3005'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://yourclass:yourclass@postgres:5432/yourclass
      - PORT=3005
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    ports:
      - '3006:3006'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://yourclass:yourclass@postgres:5432/yourclass
      - PORT=3006
    depends_on:
      postgres:
        condition: service_healthy

  live-service:
    build:
      context: ./services/live
      dockerfile: Dockerfile
    ports:
      - '3007:3007'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://yourclass:yourclass@postgres:5432/yourclass
      - PORT=3007
      - AGORA_APP_ID=${AGORA_APP_ID}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE}
    depends_on:
      postgres:
        condition: service_healthy

  test-service:
    build:
      context: ./services/test
      dockerfile: Dockerfile
    ports:
      - '3008:3008'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://yourclass:yourclass@postgres:5432/yourclass
      - PORT=3008
    depends_on:
      postgres:
        condition: service_healthy

  chat-service:
    build:
      context: ./services/chat
      dockerfile: Dockerfile
    ports:
      - '3009:3009'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://yourclass:yourclass@postgres:5432/yourclass
      - PORT=3009
    depends_on:
      postgres:
        condition: service_healthy

  analytics-service:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    ports:
      - '3010:3010'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://yourclass:yourclass@postgres:5432/yourclass
      - PORT=3010
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
